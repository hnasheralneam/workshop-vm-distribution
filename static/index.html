<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>DawgSec Workshop VM Distribution</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body class="portal">
		<div class="portal-container card">
			<h2>DawgSec Workshop VMs</h2>
			<p class="subtitle">Claim your personal workshop VM below.</p>

			<div id="claim-buttons">
				<button id="claim-btn" onclick="handleTerminalAccess()">Claim</button>
			</div>
			<p id="status-message"></p>
		</div>

		<script>
			const OS_LABELS = { windows: "Claim Windows", linux: "Claim Linux" };

			// 1. Check for existing session on page load
			let existingUrl = localStorage.getItem("assigned_vm_url");
			const buttonsContainer = document.getElementById("claim-buttons");
			const status = document.getElementById("status-message");

			function renderButtons(labels) {
				buttonsContainer.innerHTML = "";
				for (const label of labels) {
					const btn = document.createElement("button");
					btn.className = "claim-btn";
					btn.innerText = label.text;
					btn.onclick = () => handleTerminalAccess(label.os, btn);
					buttonsContainer.appendChild(btn);
				}
			}

			function setButtonsDisabled(disabled) {
				for (const btn of buttonsContainer.querySelectorAll("button")) {
					btn.disabled = disabled;
				}
			}

			async function init() {
				if (existingUrl) {
					renderButtons([{ text: "Reconnect", os: null }]);
					status.innerText = "You already have an assigned machine.";
					setButtonsDisabled(true);
					await checkExistingVm();
					return;
				}

				// Only offer an OS choice when more than one type is actually available.
				try {
					const response = await fetch("/api/types");
					const data = await response.json();
					if (data.types && data.types.length > 1) {
						renderButtons(data.types.map((os) => ({ text: OS_LABELS[os] || `Claim ${os}`, os })));
					} else {
						renderButtons([{ text: "Claim", os: data.types ? data.types[0] : null }]);
					}
				} catch (error) {
					renderButtons([{ text: "Claim", os: null }]);
				}
			}

			// 2. Confirm the stored VM is still claimed for us before trusting it;
			// it may have been deleted/recreated by the instructor in the meantime.
			async function checkExistingVm() {
				try {
					const response = await fetch(`/api/validate?url=${encodeURIComponent(existingUrl)}`);
					const data = await response.json();

					if (!data.valid) {
						if (data.url) {
							localStorage.setItem("assigned_vm_url", data.url);
							existingUrl = data.url;
							renderButtons([{ text: "Reconnect", os: null }]);
							status.innerText = "Your previous machine expired. A new machine has been assigned.";
						} else {
							localStorage.removeItem("assigned_vm_url");
							existingUrl = null;
							status.innerText = data.expired
								? "Your previous machine expired and no new machines are available. Please contact your instructor."
								: "Your previous machine is no longer available. Claim a new one below.";
							await init();
							return;
						}
					}
				} catch (error) {
					status.innerText = "Network error checking your machine. Please try again.";
				} finally {
					setButtonsDisabled(false);
				}
			}

			async function handleTerminalAccess(os, btn) {
				// 3. If they already have a VM, just redirect them back to it
				if (existingUrl) {
					status.innerText = "Redirecting...";
					window.location.href = existingUrl;
					return;
				}

				// 4. Otherwise, pull a new VM from the backend queue
				setButtonsDisabled(true);
				status.innerText = "Assigning your machine...";

				try {
					const query = os ? `?os=${encodeURIComponent(os)}` : "";
					const response = await fetch(`/api/claim${query}`);
					const data = await response.json();

					if (response.ok) {
						// Save the exact URL so they can reload/return later
						localStorage.setItem("assigned_vm_url", data.url);
						status.innerText = "VM claimed! Redirecting...";

						// Direct redirect instead of popup
						window.location.href = data.url;
					} else {
						status.innerText = data.detail;
						setButtonsDisabled(false);
					}
				} catch (error) {
					status.innerText = "Network error. Please try again.";
					setButtonsDisabled(false);
				}
			}

			init();
		</script>
	</body>
</html>
