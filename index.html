<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>DawgSec Workshop VM Distribution</title>
		<style>
			:root {
				color-scheme: dark;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #0f1115;
				color: #e6e6e6;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}

			.portal-container {
				width: 100%;
				max-width: 420px;
				margin: 1.5rem;
				padding: 2rem;
				background: #181b21;
				border: 1px solid #2a2e37;
				border-radius: 12px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
				text-align: center;
			}

			h2 {
				margin: 0 0 0.25rem;
				font-size: 1.4rem;
			}

			.subtitle {
				margin: 0 0 1.25rem;
				color: #9aa0ab;
				font-size: 0.9rem;
			}

			#claim-btn {
				width: 100%;
				padding: 0.85rem 1rem;
				font-size: 1rem;
				font-weight: 600;
				color: #0f1115;
				background: #4ade80;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				transition: background 0.15s ease, transform 0.05s ease;
			}

			#claim-btn:hover:not(:disabled) {
				background: #3fce72;
			}

			#claim-btn:active:not(:disabled) {
				transform: scale(0.99);
			}

			#claim-btn:disabled {
				background: #2a2e37;
				color: #6b7280;
				cursor: not-allowed;
			}

			#status-message {
				margin-top: 1rem;
				min-height: 1.2em;
				font-size: 0.9rem;
				color: #9aa0ab;
			}
		</style>
	</head>
	<body>
		<div class="portal-container">
			<h2>DawgSec Workshop VMs</h2>
			<p class="subtitle">Claim your personal workshop VM below.</p>

			<button id="claim-btn" onclick="handleTerminalAccess()">Claim</button>
			<p id="status-message"></p>
		</div>

		<script>
			// 1. Check for existing session on page load
			let existingUrl = localStorage.getItem("assigned_vm_url");
			const btn = document.getElementById("claim-btn");
			const status = document.getElementById("status-message");

			if (existingUrl) {
				btn.innerText = "Reconnect";
				status.innerText = "You already have an assigned machine.";
				btn.disabled = true;
				checkExistingVm();
			}

			// 2. Confirm the stored VM is still claimed for us before trusting it;
			// it may have been deleted/recreated by the instructor in the meantime.
			async function checkExistingVm() {
				try {
					const response = await fetch(`/api/validate?url=${encodeURIComponent(existingUrl)}`);
					const data = await response.json();

					if (!data.valid) {
						localStorage.removeItem("assigned_vm_url");
						existingUrl = null;
						btn.innerText = "Claim";
						status.innerText = "Your previous machine is no longer available. Claim a new one below.";
					}
				} catch (error) {
					status.innerText = "Network error checking your machine. Please try again.";
				} finally {
					btn.disabled = false;
				}
			}

			async function handleTerminalAccess() {
				// 3. If they already have a VM, just redirect them back to it
				if (existingUrl) {
					status.innerText = "Redirecting...";
					window.location.href = existingUrl;
					return;
				}

				// 4. Otherwise, pull a new VM from the backend queue
				btn.disabled = true;
				status.innerText = "Assigning your machine...";

				try {
					const response = await fetch('/api/claim');
					const data = await response.json();

					if (response.ok) {
						// Save the exact URL so they can reload/return later
						localStorage.setItem("assigned_vm_url", data.url);
						status.innerText = "VM claimed! Redirecting...";

						// Direct redirect instead of popup
						window.location.href = data.url;
					} else {
						status.innerText = data.detail;
						btn.disabled = false;
					}
				} catch (error) {
					status.innerText = "Network error. Please try again.";
					btn.disabled = false;
				}
			}
		</script>
	</body>
</html>
